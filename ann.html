<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameVault — Announcements</title>
  <link rel="icon" type="image/jpg" href="images/Logo.jpg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #7d5fff;
      --accent-light: #a47eff;
      --accent-dark: #5a3edc;
      --bg:   #080a10;
      --bg2:  #0d1018;
      --bg3:  #111520;
      --bg4:  #161b27;
      --bg5:  #1c2232;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(125,95,255,0.30);
      --text:  #eef2ff;
      --text2: #8a94ae;
      --text3: #4e5870;
      --glass: rgba(8,10,16,0.90);
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 45% at 5% 0%, rgba(125,95,255,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 95% 100%, rgba(164,126,255,0.06) 0%, transparent 55%);
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

    /* ═══ NAVBAR ═══ */
    .navbar {
      width: 100%; padding: 0 5%;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap; min-height: 62px;
      background: var(--glass); backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 1100;
    }
    .logo {
      font-size: 21px; font-weight: 900; letter-spacing: -.5px;
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-decoration: none; flex-shrink: 0;
    }
    .nav { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; }
    .nav-link {
      color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 7px 13px; border-radius: 40px; transition: all .18s; white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); background: var(--bg5); }
    .nav-link.active { color: var(--text); background: var(--bg5); }

    /* ═══ PAGE HEADER ═══ */
    .page-header {
      position: relative; z-index: 1;
      max-width: 860px; margin: 0 auto;
      padding: 40px 5% 24px;
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 14px;
    }
    .page-title {
      font-size: clamp(22px, 3vw, 32px); font-weight: 900; letter-spacing: -.5px;
      display: flex; align-items: center; gap: 10px;
    }
    .badge-live {
      font-size: 9px; font-weight: 800; letter-spacing: 1.8px; text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      padding: 4px 10px; border-radius: 20px; color: #fff;
      animation: pulse-live 2.5s ease-in-out infinite;
    }
    @keyframes pulse-live {
      0%,100% { box-shadow: 0 0 0 0 rgba(125,95,255,.5); }
      50%      { box-shadow: 0 0 0 7px rgba(125,95,255,0); }
    }
    .page-sub { color: var(--text3); font-size: 12px; margin-top: 5px; }

    /* ═══ MAIN ═══ */
    .ann-section {
      max-width: 860px; margin: 0 auto;
      padding: 0 5% 80px; position: relative; z-index: 1;
    }

    /* ═══ FILTER BAR ═══ */
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; align-items: center;
    }
    .filter-btn {
      padding: 6px 16px; border-radius: 30px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--border); background: var(--bg4); color: var(--text2);
      cursor: pointer; transition: all .18s; font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ═══ ANN CARD ═══ */
    .ann-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 18px; padding: 22px 24px; margin-bottom: 14px;
      display: flex; gap: 18px; align-items: flex-start;
      transition: border-color .2s, transform .2s;
      animation: fadeUp .3s ease both;
      position: relative; overflow: hidden;
    }
    .ann-card:hover { border-color: var(--border2); transform: translateY(-2px); }
    .ann-card.pinned { border-color: rgba(125,95,255,0.4); }
    .ann-card.pinned::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* icon */
    .ann-icon {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      background: rgba(125,95,255,0.12);
    }
    .ann-icon.type-update   { background: rgba(45,212,191,0.12); }
    .ann-icon.type-event    { background: rgba(245,158,11,0.12); }
    .ann-icon.type-alert    { background: rgba(239,68,68,0.12); }
    .ann-icon.type-info     { background: rgba(125,95,255,0.12); }

    .ann-body { flex: 1; min-width: 0; }
    .ann-meta {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .ann-type-badge {
      font-size: 9px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
      padding: 2px 8px; border-radius: 20px;
    }
    .badge-update  { background: rgba(45,212,191,0.15); color: #2dd4bf; }
    .badge-event   { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .badge-alert   { background: rgba(239,68,68,0.15);  color: #ef4444; }
    .badge-info    { background: rgba(125,95,255,0.15); color: var(--accent-light); }
    .badge-pinned  { background: rgba(125,95,255,0.2);  color: var(--accent-light); }

    .ann-date { font-size: 11px; color: var(--text3); }
    .ann-title-text {
      font-size: 16px; font-weight: 800; color: var(--text);
      margin-bottom: 6px; line-height: 1.3;
    }
    .ann-message {
      font-size: 13px; color: var(--text2); line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
    }

    /* ═══ STATES ═══ */
    .loading-state { text-align: center; padding: 80px 20px; }
    .spinner {
      width: 42px; height: 42px; border-radius: 50%;
      border: 3px solid var(--border); border-top-color: var(--accent);
      animation: spin .75s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { color: var(--text3); font-size: 13px; }
    .empty-state {
      text-align: center; padding: 80px 20px; color: var(--text3);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text2); margin-bottom: 8px; }
    .empty-state p { font-size: 13px; }

    /* ═══ FOOTER ═══ */
    .footer {
      text-align: center; padding: 28px 20px;
      color: var(--text3); border-top: 1px solid var(--border);
      font-size: 12px; position: relative; z-index: 1;
    }
    .social-link {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--bg4); width: 38px; height: 38px; border-radius: 50%;
      margin-bottom: 12px; text-decoration: none;
      border: 1px solid var(--border); transition: border-color .2s, background .2s;
    }
    .social-link:hover { border-color: var(--accent); background: var(--bg5); }
    .social-icon-facebook { font-weight: 900; font-size: 18px; color: var(--accent); }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 600px) {
      .ann-card { flex-direction: column; gap: 12px; padding: 18px; }
      .ann-icon { width: 36px; height: 36px; font-size: 16px; }
      .ann-title-text { font-size: 14px; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <a class="logo" href="index.html">GAMEVAULT</a>
  <nav class="nav">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link" href="faq.html">FAQ / Tutorial</a>
    <a class="nav-link" href="updates.html">Updates</a>
    <a class="nav-link active" href="ann.html">Announcements</a>
  </nav>
</header>

<!-- PAGE HEADER -->
<div class="page-header">
  <div>
    <div class="page-title">📢 Announcements <span class="badge-live">Live</span></div>
    <div class="page-sub" id="pageSubtext">Loading…</div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="ann-section">
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="update">Updates</button>
    <button class="filter-btn" data-filter="event">Events</button>
    <button class="filter-btn" data-filter="alert">Alerts</button>
    <button class="filter-btn" data-filter="info">Info</button>
  </div>

  <!-- ANN LIST -->
  <div id="annContainer">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Fetching announcements…</p>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div>
    <a class="social-link" href="https://www.facebook.com/profile.php?id=61590194378758"
       target="_blank" rel="noopener">
      <span class="social-icon-facebook">f</span>
    </a>
  </div>
  <div>© 2026 GameVault — All rights reserved.</div>
</footer>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import {
    getFirestore, collection, onSnapshot, query, orderBy, where
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: 'AIzaSyCMKY0LTMwcVW__SkhxGBz3rcvjvWjUGtU',
    authDomain: 'gamevault-380f7.firebaseapp.com',
    projectId: 'gamevault-380f7',
    storageBucket: 'gamevault-380f7.firebasestorage.app',
    messagingSenderId: '533825597908',
    appId: '1:533825597908:web:598d526a9dc4c6ea6de641'
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const TYPE_META = {
    update: { icon: '🔄', label: 'Update',  cls: 'type-update', badge: 'badge-update' },
    event:  { icon: '🎉', label: 'Event',   cls: 'type-event',  badge: 'badge-event'  },
    alert:  { icon: '🚨', label: 'Alert',   cls: 'type-alert',  badge: 'badge-alert'  },
    info:   { icon: 'ℹ️', label: 'Info',    cls: 'type-info',   badge: 'badge-info'   },
  };

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) +
      ' · ' + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  }

  function timeAgo(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = Math.floor((Date.now() - d.getTime()) / 1000);
    if (diff < 60)   return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
    return formatDate(ts);
  }

  let allAnn = [];
  let activeFilter = 'all';

  function render() {
    const container = document.getElementById('annContainer');
    const filtered = activeFilter === 'all'
      ? allAnn
      : allAnn.filter(a => (a.type || 'info') === activeFilter);

    document.getElementById('pageSubtext').textContent =
      `${allAnn.length} announcement${allAnn.length !== 1 ? 's' : ''} · ${allAnn.filter(a=>a.active).length} active`;

    if (!filtered.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <h3>No announcements</h3>
          <p>${activeFilter === 'all' ? 'Nothing posted yet. Check back soon!' : 'No ' + activeFilter + ' announcements found.'}</p>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map((a, idx) => {
      const t    = TYPE_META[a.type] || TYPE_META.info;
      const pinned = a.pinned ? ' pinned' : '';
      return `
        <div class="ann-card${pinned}" style="animation-delay:${idx * 0.05}s">
          <div class="ann-icon ${t.cls}">${t.icon}</div>
          <div class="ann-body">
            <div class="ann-meta">
              <span class="ann-type-badge ${t.badge}">${t.label}</span>
              ${a.pinned ? '<span class="ann-type-badge badge-pinned">📌 Pinned</span>' : ''}
              ${!a.active ? '<span class="ann-type-badge" style="background:rgba(107,114,128,0.15);color:#6b7280">Inactive</span>' : ''}
              <span class="ann-date">${timeAgo(a.created_at)}</span>
            </div>
            <div class="ann-title-text">${esc(a.title)}</div>
            <div class="ann-message">${esc(a.message)}</div>
          </div>
        </div>`;
    }).join('');
  }

  /* real-time listener — shows all announcements (active + inactive) sorted newest first */
  onSnapshot(
    query(collection(db, 'announcements'), orderBy('created_at', 'desc')),
    snap => {
      allAnn = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    },
    err => {
      document.getElementById('annContainer').innerHTML =
        `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Couldn't load</h3><p>${esc(err.message)}</p></div>`;
    }
  );

  /* filter buttons */
  document.getElementById('filterBar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
</script>
</body>
</html>
