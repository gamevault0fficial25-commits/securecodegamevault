<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameVault — Latest Updates</title>
  <link rel="icon" type="image/jpg" href="images/Logo.jpg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent:       #7d5fff;
      --accent-light: #a47eff;
      --accent-dark:  #5a3edc;
      --bg:    #080a10;
      --bg2:   #0d1018;
      --bg3:   #111520;
      --bg4:   #161b27;
      --bg5:   #1c2232;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(125,95,255,0.30);
      --text:  #eef2ff;
      --text2: #8a94ae;
      --text3: #4e5870;
      --glass: rgba(8,10,16,0.90);
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 45% at 5%  0%,   rgba(125,95,255,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 95% 100%, rgba(164,126,255,0.06) 0%, transparent 55%);
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

    /* ═══ NAVBAR ═══ */
    .navbar {
      width: 100%; padding: 0 5%;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap; min-height: 62px;
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 1100;
    }
    .logo {
      font-size: 21px; font-weight: 900; letter-spacing: -.5px;
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-decoration: none; flex-shrink: 0;
    }
    .nav { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; }
    .nav-link {
      color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 7px 13px; border-radius: 40px; transition: all .18s; white-space: nowrap;
      background: none; border: none; cursor: pointer; font-family: inherit;
    }
    .nav-link:hover { color: var(--text); background: var(--bg5); }
    .nav-link.active { color: var(--text); background: var(--bg5); }
    .nav-dropdown { position: relative; }
    .nav-dropdown-content {
      display: none; position: absolute; top: 100%; left: 0;
      background: var(--bg3); backdrop-filter: blur(20px);
      min-width: 170px; border: 1px solid var(--border); border-radius: 14px;
      padding: 6px; z-index: 1200;
      box-shadow: 0 24px 60px rgba(0,0,0,.6);
      margin-top: 0;
    }
    .nav-dropdown::after {
      content: ''; position: absolute;
      top: 100%; left: 0; right: 0;
      height: 12px;
    }
    .nav-dropdown.open .nav-dropdown-content { display: block; }
    .nav-dropdown:hover .nav-dropdown-content { display: block; }
    .nav-dropdown-content .nav-link { display: block; width: 100%; padding: 9px 14px; border-radius: 10px; }

    /* ═══ PAGE HEADER ═══ */
    .page-header {
      position: relative; z-index: 1;
      max-width: 1400px; margin: 0 auto;
      padding: 36px 5% 22px;
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .page-title {
      font-size: clamp(20px, 2.8vw, 30px); font-weight: 900; letter-spacing: -.5px;
      display: flex; align-items: center; gap: 10px;
    }
    .badge-live {
      font-size: 9px; font-weight: 800; letter-spacing: 1.8px; text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      padding: 4px 10px; border-radius: 20px; color: #fff;
      animation: pulse-live 2.5s ease-in-out infinite;
    }
    @keyframes pulse-live {
      0%,100% { box-shadow: 0 0 0 0   rgba(125,95,255,.5); }
      50%      { box-shadow: 0 0 0 7px rgba(125,95,255,0);  }
    }
    .page-sub { color: var(--text3); font-size: 12px; margin-top: 5px; }

    .stats-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .stat-chip {
      background: var(--bg4); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 14px;
      font-size: 11px; color: var(--text2);
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .stat-chip strong { color: var(--text); font-size: 17px; font-weight: 800; }

    /* ═══ DIVIDER ═══ */
    .divider { max-width: 1400px; margin: 0 auto; padding: 0 5%; position: relative; z-index: 1; }
    .divider hr { border: none; border-top: 1px solid var(--border); margin-bottom: 24px; }

    /* ═══ UPDATES SECTION ═══ */
    .updates-section {
      max-width: 1400px; margin: 0 auto;
      padding: 0 5% 70px; position: relative; z-index: 1;
    }

    /* ═══ DATE GROUP ═══ */
    .update-group {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 18px; margin-bottom: 12px; overflow: hidden;
      transition: border-color .25s;
      animation: fadeUp .32s ease both;
    }
    .update-group:hover { border-color: var(--border2); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    .update-group summary {
      list-style: none; cursor: pointer;
      padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      transition: background .18s; user-select: none;
    }
    .update-group summary::-webkit-details-marker { display: none; }
    .update-group summary:hover { background: rgba(255,255,255,0.03); }
    .update-group[open] > summary {
      background: rgba(125,95,255,0.07);
      border-bottom: 1px solid var(--border);
    }
    .summary-left { display: flex; align-items: center; gap: 11px; flex: 1; min-width: 0; }
    .chevron {
      width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
      background: var(--bg5); display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 10px; font-weight: 700;
      transition: transform .28s cubic-bezier(.4,0,.2,1), background .2s, color .2s;
    }
    .update-group[open] .chevron {
      transform: rotate(180deg);
      background: var(--accent); color: #fff;
    }
    .date-info { line-height: 1.2; min-width: 0; }
    .date-main {
      font-size: 14px; font-weight: 700; color: var(--text);
      display: flex; align-items: baseline; gap: 0; flex-wrap: wrap;
    }
    .date-day  { font-size: 20px; font-weight: 900; color: var(--accent-light); margin-right: 5px; line-height: 1; }
    .date-rel  { font-size: 11px; color: var(--text3); font-weight: 400; margin-left: 6px; }
    .summary-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .tag-today {
      background: rgba(0,255,163,.1); color: #00ffa3;
      border: 1px solid rgba(0,255,163,.25);
      padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 800;
      letter-spacing: .5px; white-space: nowrap;
    }
    .tag-count {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      padding: 5px 13px; border-radius: 20px; font-size: 11px; font-weight: 700;
      color: #fff; white-space: nowrap;
    }

    /* ═══ GAMES GRID ═══ */
    .updates-grid {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
      gap: 10px;
    }

    /* ═══ GAME CARD ═══ */
    .update-card {
      background: var(--bg4); border-radius: 11px; overflow: hidden;
      border: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: transform .2s, border-color .2s, box-shadow .2s;
    }
    .update-card:hover {
      transform: translateY(-4px) scale(1.025);
      border-color: var(--accent);
      box-shadow: 0 10px 28px rgba(125,95,255,.22);
    }
    .update-thumb { height: 122px; overflow: hidden; flex-shrink: 0; background: var(--bg5); }
    .update-thumb img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .35s;
    }
    .update-card:hover .update-thumb img { transform: scale(1.07); }
    .update-thumb .no-img {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: var(--text3);
    }
    .update-info { padding: 7px 7px 3px; flex: 1; }
    .update-category {
      display: inline-block;
      background: rgba(125,95,255,.15); color: var(--accent-light);
      padding: 2px 6px; border-radius: 20px; font-size: 9px; font-weight: 700;
      letter-spacing: .3px; text-transform: uppercase; max-width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .update-info h3 {
      margin-top: 4px; font-size: 11px; font-weight: 700; color: var(--text);
      line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .dl-btn {
      display: block; text-align: center;
      margin: 5px 7px 7px; padding: 6px 4px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff; text-decoration: none;
      border-radius: 7px; font-weight: 800; font-size: 9px;
      letter-spacing: .7px; text-transform: uppercase;
      transition: filter .2s, transform .15s;
    }
    .dl-btn:hover { filter: brightness(1.18); transform: scale(0.97); }

    /* ═══ STATES ═══ */
    .loading-state { text-align: center; padding: 80px 20px; }
    .spinner {
      width: 42px; height: 42px; border-radius: 50%;
      border: 3px solid var(--border); border-top-color: var(--accent);
      animation: spin .75s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { color: var(--text3); font-size: 13px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }

    /* ═══ FOOTER ═══ */
    .footer {
      text-align: center; padding: 28px 20px;
      color: var(--text3); border-top: 1px solid var(--border);
      font-size: 12px; position: relative; z-index: 1;
    }
    .social-link {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--bg4); width: 38px; height: 38px; border-radius: 50%;
      margin-bottom: 12px; text-decoration: none;
      border: 1px solid var(--border); transition: border-color .2s, background .2s;
    }
    .social-link:hover { border-color: var(--accent); background: var(--bg5); }
    .social-icon-facebook { font-weight: 900; font-size: 18px; color: var(--accent); }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 700px) {
      .navbar { padding: 12px 4%; min-height: auto; }
      .nav { justify-content: center; }
      .page-header { padding: 24px 4% 16px; }
      .updates-section { padding: 0 4% 50px; }
      .updates-grid { grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 8px; }
      .update-thumb { height: 108px; }
    }
    @media (max-width: 380px) {
      .updates-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<!-- ═══ NAVBAR ═══ -->
<header class="navbar">
  <a class="logo" href="index.html">GAMEVAULT</a>
  <nav class="nav">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link" href="faq.html">FAQ / Tutorial</a>
    <a class="nav-link active" href="updates.html">Updates</a>
    <a class="nav-link" href="ann.html">Announcements</a>
  </nav>
</header>

<!-- ═══ PAGE HEADER ═══ -->
<div class="page-header">
  <div>
    <div class="page-title">Latest Updates <span class="badge-live">Live</span></div>
    <div class="page-sub" id="pageSubtext">Loading catalog…</div>
  </div>
  <div class="stats-row" id="statsRow"></div>
</div>

<div class="divider"><hr></div>

<!-- ═══ MAIN ═══ -->
<section class="updates-section">
  <div id="updatesContainer">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Fetching latest games…</p>
    </div>
  </div>
</section>

<!-- ═══ FOOTER ═══ -->
<footer class="footer">
  <div>
    <a class="social-link" href="https://www.facebook.com/profile.php?id=61590194378758"
       target="_blank" rel="noopener">
      <span class="social-icon-facebook">f</span>
    </a>
  </div>
  <div>© 2026 GameVault — All rights reserved.</div>
</footer>

<script src="js/index-app.js" defer></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: 'AIzaSyCMKY0LTMwcVW__SkhxGBz3rcvjvWJUGtU',
    authDomain: 'gamevault-380f7.firebaseapp.com',
    projectId: 'gamevault-380f7',
    storageBucket: 'gamevault-380f7.firebasestorage.app',
    messagingSenderId: '533825597908',
    appId: '1:533825597908:web:598d526a9dc4c6ea6de641'
  };

  let app, db;
  try {
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
  } catch (e) {
    console.warn("Firebase init error", e);
    db = null;
  }

  function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
  }

  function tsToISO(ts) {
    if (!ts) return null;
    try {
      if (typeof ts?.toDate === 'function') return ts.toDate().toISOString().slice(0,10);
      if (ts instanceof Date) return ts.toISOString().slice(0,10);
      if (typeof ts === 'string') return ts.slice(0,10);
      if (typeof ts === 'number') return new Date(ts).toISOString().slice(0,10);
    } catch (_) {}
    return null;
  }

  function dateLabel(iso) {
    if (!iso) return 'Unknown';
    try {
      return new Date(iso).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
    } catch { return iso; }
  }

  function relLabel(iso, today) {
    const diff = Math.round((new Date(today) - new Date(iso)) / 86400000);
    if (diff === 0) return 'today';
    if (diff === 1) return 'yesterday';
    if (diff <= 6)  return diff + 'd ago';
    if (diff <= 13) return '1 week ago';
    if (diff <= 20) return '2 weeks ago';
    return null;
  }

  function esc(s) {
    if (s === undefined || s === null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function isValidThumb(url) {
    if (!url || typeof url !== 'string') return false;
    const trimmed = url.trim();
    if (trimmed === '' || trimmed === 'null' || trimmed === '#') return false;
    return trimmed.startsWith('http://') || trimmed.startsWith('https://');
  }

  function cardHtml(g) {
    const hasThumb = isValidThumb(g.thumb);
    const thumbHtml = hasThumb
      ? `<img src="${esc(g.thumb)}" alt="${esc(g.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="no-img" style="display:none">🎮</div>`
      : '<div class="no-img">🎮</div>';
    const dlDisabled = !g.downloadUrl || g.downloadUrl === '#';
    return `<div class="update-card">
      <div class="update-thumb">${thumbHtml}</div>
      <div class="update-info">
        <span class="update-category">${esc(g.category || 'Game')}</span>
        <h3>${esc(g.name || 'Untitled')}</h3>
      </div>
      ${dlDisabled
        ? '<span class="dl-btn" style="opacity:.4;cursor:default;background:var(--bg5)">Coming Soon</span>'
        : `<a href="${esc(g.downloadUrl)}" target="_blank" rel="noopener" class="dl-btn">⬇ Download</a>`
      }
    </div>`;
  }

  function render(allGames) {
    const container = document.getElementById('updatesContainer');
    const TODAY = todayISO();

    if (!allGames || !allGames.length) {
      container.innerHTML = '<div class="empty-state">No games yet.</div>';
      document.getElementById('pageSubtext').textContent = '0 games';
      document.getElementById('statsRow').innerHTML = `<div class="stat-chip"><strong>0</strong>Total Games</div><div class="stat-chip"><strong>0</strong>Dashboard Added</div><div class="stat-chip"><strong>0</strong>Update Days</div>`;
      return;
    }

    const seen = new Set();
    const unique = allGames.filter(g => {
      const k = g.name?.toLowerCase();
      if (seen.has(k)) return false;
      seen.add(k);
      return true;
    });

    const CATALOG_KEY = 'catalog';
    const groups = {};

    unique.forEach(g => {
      let dateKey = CATALOG_KEY;
      const fromFirestore = g._source === 'firestore';
      let addedTimestamp = null;
      if (fromFirestore && (g.createdAt || g.created_at)) {
        addedTimestamp = tsToISO(g.createdAt || g.created_at);
        if (addedTimestamp) dateKey = addedTimestamp;
      } else if (g.addedDate && /^\d{4}-\d{2}-\d{2}$/.test(g.addedDate)) {
        dateKey = g.addedDate;
      }
      if (!groups[dateKey]) groups[dateKey] = [];
      groups[dateKey].push(g);
    });

    const sortedKeys = Object.keys(groups).sort((a,b) => {
      if (a === CATALOG_KEY) return 1;
      if (b === CATALOG_KEY) return -1;
      return a < b ? 1 : -1;
    });

    const fsCount = unique.filter(g => g._source === 'firestore').length;
    document.getElementById('pageSubtext').textContent = `${unique.length} games total · ${fsCount} added via dashboard`;
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-chip"><strong>${unique.length}</strong>Total Games</div>
      <div class="stat-chip"><strong>${fsCount}</strong>Dashboard Added</div>
      <div class="stat-chip"><strong>${sortedKeys.filter(k=>k!==CATALOG_KEY).length}</strong>Update Days</div>`;

    container.innerHTML = sortedKeys.map((dateKey, idx) => {
      const games = groups[dateKey];
      const isCatalog = dateKey === CATALOG_KEY;
      const isToday = dateKey === TODAY;
      const label = isCatalog ? 'Pre-loaded Catalog' : dateLabel(dateKey);
      const rel = isCatalog ? null : relLabel(dateKey, TODAY);

      return `<details class="update-group"${idx === 0 ? ' open' : ''} style="animation-delay:${idx*0.045}s">
        <summary>
          <div class="summary-left">
            <div class="chevron">▾</div>
            <div class="date-info">
              <div class="date-main">${esc(label)}${rel ? `<span class="date-rel"> (${rel})</span>` : ''}</div>
            </div>
          </div>
          <div class="summary-right">
            ${isToday ? '<span class="tag-today">● TODAY</span>' : ''}
            ${isCatalog ? '<span class="tag-count" style="background:var(--bg5);color:var(--text2)">'+games.length+' Games</span>' : '<span class="tag-count">'+games.length+' Update'+(games.length!==1?'s':'')+'</span>'}
          </div>
        </summary>
        <div class="updates-grid">${games.map(cardHtml).join('')}</div>
      </details>`;
    }).join('');
  }

  function waitForCatalog(timeout = 2000) {
    return new Promise(resolve => {
      if (window.GAMES_CATALOG && Array.isArray(window.GAMES_CATALOG)) {
        resolve(window.GAMES_CATALOG);
        return;
      }
      let elapsed = 0;
      const interval = 100;
      const check = setInterval(() => {
        elapsed += interval;
        if (window.GAMES_CATALOG && Array.isArray(window.GAMES_CATALOG)) {
          clearInterval(check);
          resolve(window.GAMES_CATALOG);
        } else if (elapsed >= timeout) {
          clearInterval(check);
          console.warn('GAMES_CATALOG not found after timeout, using empty catalog');
          resolve([]);
        }
      }, interval);
    });
  }

  async function startSafeListener() {
    const rawCatalog = await waitForCatalog(2500);
    const catalog = (rawCatalog || []).map(g => ({
      ...g,
      id: String(g.id || ''),
      _source: 'catalog',
      status: g.status || 'active',
      downloads: g.downloads || 0,
      name: g.name || 'Unknown'
    }));

    if (!db) {
      render(catalog);
      return;
    }

    let unsub = null;
    try {
      unsub = onSnapshot(collection(db, 'games'),
        (snap) => {
          const fsGames = snap.docs.map(d => ({ ...d.data(), id: d.id, _source: 'firestore' }))
            .filter(g => g.status !== 'hidden');
          const fsNames = new Set(fsGames.map(g => g.name?.toLowerCase()));
          const catalogOnly = catalog.filter(g => !fsNames.has(g.name?.toLowerCase()));
          render([...fsGames, ...catalogOnly]);
        },
        (err) => {
          console.warn("Firestore onSnapshot error:", err?.message);
          render(catalog);
        }
      );
    } catch (err) {
      console.warn("Firestore listener setup failed", err);
      render(catalog);
    }
  }

  startSafeListener();
</script>
</body>
</html>
