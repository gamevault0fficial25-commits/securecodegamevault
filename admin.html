<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Code Management</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/jpg" href="images/Logo.jpg" />
</head>
<body>
<div id="adminApp" class="admin-login-container">
  <div class="admin-card" id="adminPanel"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    doc,
    getDocs,
    getDoc,
    setDoc,
    updateDoc,
    deleteDoc,
    query,
    orderBy,
    serverTimestamp,
    Timestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

 
  const firebaseConfig = {
    apiKey: "AIzaSyCMKY0LTMwcVW__SkhxGBz3rcvjvWjUGtU",
    authDomain: "gamevault-380f7.firebaseapp.com",
    projectId: "gamevault-380f7",
    storageBucket: "gamevault-380f7.firebasestorage.app",
    messagingSenderId: "533825597908",
    appId: "1:533825597908:web:598d526a9dc4c6ea6de641",
    measurementId: "G-SKDJVGJ4S0"
  };

  const ADMIN_PASSWORD = "admin123";
 

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let adminAuthenticated = false;


  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function generateCodeString() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no O,0,I,1 to avoid confusion
    let code = '';
    for (let i = 0; i < 12; i++) {
      if (i === 4 || i === 8) code += '-';
      code += chars[Math.floor(Math.random() * chars.length)];
    }
    return code;
  }

  // ── Auth ───────────────────────────────────────────────
  function adminLogin(password) {
    if (password === ADMIN_PASSWORD) {
      adminAuthenticated = true;
      sessionStorage.setItem('gv_admin', '1');
      renderDashboard();
    } else {
      const errorDiv = document.getElementById('loginError');
      if (errorDiv) errorDiv.innerText = ' Incorrect password.';
    }
  }

  function adminLogout() {
    adminAuthenticated = false;
    sessionStorage.removeItem('gv_admin');
    renderLogin();
  }

  // ── Firebase operations ────────────────────────────────
  async function loadCodes(searchTerm = '') {
    const codesRef = collection(db, 'codes');
    const snap = await getDocs(query(codesRef, orderBy('created_at', 'desc')));
    let codes = [];
    snap.forEach(d => codes.push({ id: d.id, ...d.data() }));
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      codes = codes.filter(c =>
        c.id.toLowerCase().includes(s) ||
        (c.used_by_session || '').toLowerCase().includes(s)
      );
    }
    return codes;
  }

  function computeStats(codes) {
    const now = new Date();
    let used = 0, unused = 0, disabled = 0, expired = 0;
    for (const c of codes) {
      if (c.status === 'disabled') { disabled++; continue; }
      if (c.expires_at) {
        const exp = c.expires_at.toDate ? c.expires_at.toDate() : new Date(c.expires_at);
        if (now > exp) { expired++; continue; }
      }
      if (c.status === 'used') used++;
      else unused++;
    }
    return { total: codes.length, used, unused, disabled, expired };
  }

  async function generateCodes(count = 1, expiryDays = null) {
    const now = new Date();
    let expiresAt = null;
    if (expiryDays && expiryDays > 0) {
      expiresAt = new Date(now.getTime() + expiryDays * 86400000);
    }

    const created = [];
    for (let i = 0; i < count; i++) {
      const codeKey = generateCodeString();
      const docData = {
        status: 'unused',
        created_at: serverTimestamp(),
        used_by_session: null,
        used_at: null,
        expires_at: expiresAt ? Timestamp.fromDate(expiresAt) : null
      };
      await setDoc(doc(db, 'codes', codeKey), docData);
      created.push(codeKey);
    }
    return created;
  }

  async function toggleCode(codeId, currentStatus) {
    const codeRef = doc(db, 'codes', codeId);
    const newStatus = currentStatus === 'disabled' ? 'unused' : 'disabled';
    await updateDoc(codeRef, { status: newStatus });
  }

  async function deleteCode(codeId) {
    await deleteDoc(doc(db, 'codes', codeId));
  }

  // ── UI Renders ─────────────────────────────────────────
  function renderLogin() {
    const container = document.getElementById('adminPanel');
    container.innerHTML = `
      <div style="text-align:center; max-width:340px; margin:0 auto;">
        <h2 style="margin-bottom:20px; font-size:22px;"> Admin Access</h2>
        <input type="password" id="adminPass" class="access-input" style="max-width:280px;" placeholder="Administrator password">
        <button id="adminLoginBtn" class="verify-btn" style="margin-top:16px;">Authenticate</button>
        <div id="loginError" class="access-error" style="margin-top:12px;"></div>
      </div>
    `;
    document.getElementById('adminLoginBtn').addEventListener('click', () => {
      adminLogin(document.getElementById('adminPass').value);
    });
    document.getElementById('adminPass').addEventListener('keydown', e => {
      if (e.key === 'Enter') adminLogin(document.getElementById('adminPass').value);
    });
  }

  function renderDashboard() {
    const container = document.getElementById('adminPanel');
    container.innerHTML = `
      <div>
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:24px; gap:12px;">
          <h2 style="font-size:20px; font-weight:800;"> Code Vault Admin</h2>
          <button id="logoutAdminBtn" class="btn-admin" style="background:#3a3f4e;">Logout</button>
        </div>

        <!-- Stat Cards -->
        <div class="stat-cards" id="statCards">
          <div class="stat-card"><div class="stat-number">—</div><div>Loading...</div></div>
        </div>

        <!-- Generate Panel -->
        <div class="generate-panel">
          <h3 style="margin-bottom:14px;">Generate Codes</h3>
          <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
            <input type="number" id="expiryDays" placeholder="Expiry (days, optional)" min="1"
              style="background:#0a0d14; border:1px solid #2a2f3c; padding:8px 14px; border-radius:30px; color:white; width:190px; font-size:13px;">
            <input type="number" id="bulkCount" placeholder="Quantity (1–50)" value="1" min="1" max="50"
              style="background:#0a0d14; border:1px solid #2a2f3c; padding:8px 14px; border-radius:30px; color:white; width:150px; font-size:13px;">
            <button id="genSingleBtn" class="btn-admin btn-admin-primary">+ Single</button>
            <button id="genBulkBtn" class="btn-admin btn-admin-primary"> Bulk</button>
          </div>
          <div id="genMsg" style="font-size:13px; color:#b9c3e0; margin-top:12px; min-height:20px;"></div>
        </div>

        <!-- Code Table -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px;">
          <h3>Code Registry</h3>
          <input type="text" id="searchCodes" class="search-input" placeholder="Search code or session…">
        </div>
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Code</th>
                <th>Status</th>
                <th>Enable/Disable</th>
                <th>Used By (Session)</th>
                <th>Activation Date</th>
                <th>Expires</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="codesTableBody">
              <tr><td colspan="7" style="text-align:center; padding:24px; color:#6f7893;">Loading codes…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    `;

    // Event listeners
    document.getElementById('logoutAdminBtn').addEventListener('click', adminLogout);
    document.getElementById('genSingleBtn').addEventListener('click', () => handleGenerate(false));
    document.getElementById('genBulkBtn').addEventListener('click', () => handleGenerate(true));
    document.getElementById('searchCodes').addEventListener('input', () => refreshDashboard());

    refreshDashboard();
  }

  async function handleGenerate(isBulk) {
    const expiryDays = parseInt(document.getElementById('expiryDays')?.value) || null;
    let count = 1;
    if (isBulk) {
      count = Math.min(50, Math.max(1, parseInt(document.getElementById('bulkCount')?.value) || 1));
    }
    const msgDiv = document.getElementById('genMsg');
    msgDiv.innerHTML = ` Generating ${count} code(s)…`;
    try {
      const codes = await generateCodes(count, expiryDays);
      msgDiv.innerHTML = `Generated ${codes.length} code(s): <span style="font-family:monospace; color:#a47eff;">${codes.slice(0,3).join(', ')}${codes.length > 3 ? ' …' : ''}</span>`;
      setTimeout(() => { if (msgDiv) msgDiv.innerHTML = ''; }, 5000);
      refreshDashboard();
    } catch (err) {
      msgDiv.innerHTML = `❌ Generation failed: ${err.message}`;
    }
  }

  async function refreshDashboard() {
    const searchTerm = document.getElementById('searchCodes')?.value || '';
    try {
      const codes = await loadCodes(searchTerm);
      const stats = computeStats(codes);

      // Update stat cards
      document.getElementById('statCards').innerHTML = `
        <div class="stat-card"><div class="stat-number">${stats.total}</div><div>Total</div></div>
        <div class="stat-card"><div class="stat-number">${stats.used}</div><div>Used</div></div>
        <div class="stat-card"><div class="stat-number">${stats.unused}</div><div>Unused</div></div>
        <div class="stat-card"><div class="stat-number">${stats.disabled}</div><div>Disabled</div></div>
        <div class="stat-card"><div class="stat-number">${stats.expired}</div><div>Expired</div></div>
      `;

      // Populate table
      const tbody = document.getElementById('codesTableBody');
      if (!codes.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:24px; color:#6f7893;">No codes found.</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      for (const code of codes) {
        const row = tbody.insertRow();

        // Code + copy button
        row.insertCell(0).innerHTML = `
          <span class="code-badge">${escapeHtml(code.id)}</span>
          <button class="btn-admin" style="margin-left:8px; padding:2px 8px; font-size:11px;" data-copy="${escapeHtml(code.id)}">📋</button>
        `;

        // Status badge
        const now = new Date();
        let displayStatus = code.status;
        if (code.status !== 'disabled' && code.expires_at) {
          const exp = code.expires_at.toDate ? code.expires_at.toDate() : new Date(code.expires_at);
          if (now > exp) displayStatus = 'expired';
        }
        const statusClass = { used: 'status-used', unused: 'status-unused', disabled: 'status-disabled', expired: 'status-disabled' };
        row.insertCell(1).innerHTML = `<span class="status-badge ${statusClass[displayStatus] || ''}">${displayStatus.toUpperCase()}</span>`;

        // Toggle button
        const toggleCell = row.insertCell(2);
        if (displayStatus !== 'expired') {
          const toggleBtn = document.createElement('button');
          toggleBtn.className = `btn-admin ${code.status === 'disabled' ? 'btn-admin-primary' : 'btn-admin-warning'}`;
          toggleBtn.innerText = code.status === 'disabled' ? 'Enable' : 'Disable';
          toggleBtn.onclick = async () => {
            toggleBtn.disabled = true;
            try {
              await toggleCode(code.id, code.status);
              refreshDashboard();
            } catch (e) { alert('Failed: ' + e.message); toggleBtn.disabled = false; }
          };
          toggleCell.appendChild(toggleBtn);
        } else {
          toggleCell.innerHTML = '—';
        }

        // Session info
        row.insertCell(3).innerHTML = code.used_by_session
          ? `<span title="${escapeHtml(code.used_by_session)}" style="font-family:monospace; font-size:11px;">${escapeHtml(code.used_by_session.substring(0, 18))}…</span>`
          : '—';

        // Used at
        row.insertCell(4).innerHTML = code.used_at
          ? new Date(code.used_at.toDate ? code.used_at.toDate() : code.used_at).toLocaleString()
          : '—';

        // Expires
        row.insertCell(5).innerHTML = code.expires_at
          ? new Date(code.expires_at.toDate ? code.expires_at.toDate() : code.expires_at).toLocaleDateString()
          : 'Never';

        // Delete button
        const actionsCell = row.insertCell(6);
        const delBtn = document.createElement('button');
        delBtn.innerText = 'Delete';
        delBtn.className = 'btn-admin btn-admin-danger';
        delBtn.onclick = async () => {
          if (!confirm(`Delete code ${code.id}? This will revoke access.`)) return;
          delBtn.disabled = true;
          try {
            await deleteCode(code.id);
            refreshDashboard();
          } catch (e) { alert('Delete failed: ' + e.message); delBtn.disabled = false; }
        };
        actionsCell.appendChild(delBtn);
      }

      // Copy handlers
      document.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(btn.getAttribute('data-copy'));
          const msg = document.getElementById('genMsg');
          if (msg) {
            msg.innerText = ` Copied: ${btn.getAttribute('data-copy')}`;
            setTimeout(() => { if (msg) msg.innerText = ''; }, 2000);
          }
        });
      });

    } catch (err) {
      console.error(err);
      const tbody = document.getElementById('codesTableBody');
      if (tbody) tbody.innerHTML = `<tr><td colspan="7" style="color:#ff8a7a; padding:20px;">⚠️ Firebase error: ${escapeHtml(err.message)}</td></tr>`;
    }
  }

  // ── Start ──────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem('gv_admin') === '1') {
      adminAuthenticated = true;
      renderDashboard();
    } else {
      renderLogin();
    }
  });
</script>
</body>
</html>
